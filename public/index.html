<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ola Chat | Modern Messaging</title>
  <meta name="description" content="A modern chat application for seamless communication">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="https://ola-chat-10477.web.app/favicon.ico">
</head>
<body>
  <div class="app-container">
    <!-- Auth Screen -->
    <div id="auth-container" class="auth-container">
      <div class="auth-card">
        <div class="logo">
          <i class="fas fa-comment-dots pulse" aria-hidden="true"></i>
          <h1>Ola Chat</h1>
        </div>
        <p class="tagline">Connect with friends instantly</p>
        <button id="google-signin" class="btn btn-primary" aria-label="Sign in with Google">
          <i class="fab fa-google" aria-hidden="true"></i> Continue with Google
        </button>
        <div class="auth-footer">
          <p>By continuing, you agree to our <a href="#" aria-label="Terms of Service">Terms</a> and <a href="#" aria-label="Privacy Policy">Privacy Policy</a></p>
          <p style="margin-top:10px; color:#6e2f2f;">Made by Abhishek J Nair</p>
        </div>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-container" class="chat-container hidden">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="user-profile">
            <img id="user-avatar" src="" alt="User Avatar" class="avatar">
            <span id="user-name"></span>
          </div>
          <div class="header-actions">
            <label class="theme-switch" aria-label="Toggle dark mode">
              <input type="checkbox" id="theme-checkbox">
              <span class="slider round">
                <i class="fas fa-moon icon moon" aria-hidden="true"></i>
                <i class="fas fa-sun icon sun" aria-hidden="true"></i>
              </span>
            </label>
            <button id="sign-out-btn" class="btn btn-icon" title="Sign Out" aria-label="Sign out">
              <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        
        <div class="search-container">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input type="text" id="search-contacts" placeholder="Search contacts..." aria-label="Search contacts">
        </div>
        
        <div class="contacts-list">
          <div class="empty-contacts">
            <i class="fas fa-user-plus" aria-hidden="true"></i>
            <p>No contacts found</p>
            <small>Invite friends to join!</small>
          </div>
        </div>
      </div>
      
      <div class="chat-area">
        <div class="chat-header">
          <div class="recipient-info">
            <img id="recipient-avatar" src="https://ui-avatars.com/api/?name=Unknown&background=random" alt="Recipient" class="avatar">
            <div>
              <h3 id="recipient-name">Select a contact</h3>
              <p id="recipient-status" class="status">Offline</p>
            </div>
          </div>
          <div class="chat-actions">
            <button id="quick-hide-btn" class="btn btn-icon sneaky-btn" title="Menu" aria-label="Quick hide">
              <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <button id="video-call-btn" class="btn btn-icon" disabled aria-label="Start video call">
              <i class="fas fa-video" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        
        <div id="messages" class="messages" aria-live="polite">
          <div class="empty-state">
            <i class="fas fa-comments" aria-hidden="true"></i>
            <p>Select a contact to start chatting</p>
          </div>
        </div>
        
        <div class="message-input-container">
          <button id="attach-btn" class="btn btn-icon" aria-label="Attach file">
            <i class="fas fa-paperclip" aria-hidden="true"></i>
          </button>
          <input type="text" id="message-input" placeholder="Type your message here..." disabled aria-label="Type your message">
          <button id="send-button" class="btn btn-primary" disabled aria-label="Send message">
            <i class="fas fa-paper-plane" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer style="text-align:center;padding:1rem 0;color:#888;">
    Made by Abhishek J Nair
  </footer>

  <!-- Quick Hide Overlay -->
  <div id="quick-hide-overlay" style="
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: #fff;
    transition: opacity 0.2s;
  "></div>

  <!-- Firebase SDKs -->
  <script type="module" src="/app.js"></script>
</body>
</html>
